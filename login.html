<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in — AcademiaX</title>
<link rel="stylesheet" href="css/base.css" />
<link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <div class="auth-wrap">
    <aside class="auth-aside">
      <a class="brand" href="index.html"><span class="mark" style="background:var(--marigold);color:var(--ink)">A</span>AcademiaX</a>
      <div>
        <span class="eyebrow">Welcome back</span>
        <h2>Run your institution from one screen.</h2>
        <p>Sign in with your institution code and password to reach your dashboard.</p>
        <div class="aside-tt">
          <span></span><span class="g"></span><span></span><span class="t"></span><span></span><span></span>
          <span class="t"></span><span></span><span class="g"></span><span></span><span></span><span class="g"></span>
          <span></span><span></span><span class="t"></span><span></span><span class="g"></span><span></span>
        </div>
      </div>
      <p class="mono" style="color:#8A97A8;font-size:.72rem">Admins manage here · Teachers &amp; parents use the app</p>
    </aside>

    <main class="auth-main">
      <div class="auth-card">
        <h1>Sign in</h1>
        <p class="auth-sub">Admin access to your institution.</p>
        <div id="alert" class="alert"></div>
        <form id="loginForm">
          <div class="field"><label for="code">Institution code</label><input id="code" required placeholder="e.g. DEMO1234" style="text-transform:uppercase" /></div>
          <div class="field"><label for="password">Password</label><input id="password" type="password" required /></div>
          <button class="btn btn-accent btn-block" type="submit">Sign in</button>
        </form>
        <p class="auth-foot"><a href="forgot-password.html">Forgot password?</a></p>
        <p class="auth-foot">New here? <a href="register.html">Register your institution</a></p>
      </div>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
