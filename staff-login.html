<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Staff Sign in — AcademiaX</title>
<link rel="stylesheet" href="css/base.css" />
<link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <div class="auth-wrap">
    <aside class="auth-aside">
      <a class="brand" href="index.html"><span class="mark" style="background:var(--marigold);color:var(--ink)">A</span>AcademiaX</a>
      <div>
       <span class="eyebrow">WELCOME BACK</span>
       <h2>Welcome Staff</h2>
       <p>Sign in with your mobile number and password to access your dashboard.</p>
        <div class="aside-tt">
          <span></span><span class="g"></span><span></span><span class="t"></span><span></span><span></span>
          <span class="t"></span><span></span><span class="g"></span><span></span><span></span><span class="g"></span>
          <span></span><span></span><span class="t"></span><span></span><span class="g"></span><span></span>
        </div>
      </div>
      <p class="mono" style="color:#8A97A8;font-size:.72rem">Admins manage here · Teachers &amp; parents use the app</p>
    </aside>

    <main class="auth-main">
      <div class="auth-card">
        <h1>Staff Sign In</h1>
        <p class="auth-sub">Teacher / Employee Access</p>
        <div id="alert" class="alert"></div>
        <form id="loginForm">
          <div class="field">

            <label for="phone">Mobile Number</label>
            <input id="phone"required maxlength="10"placeholder="Enter Mobile Number"autocomplete="username"/>
        </div>
          <div class="field">
            <label for="password">Password</label>
            <div style="position:relative">
              <input id="password" type="password" required autocomplete="current-password" style="width:100%;padding-right:3.4rem" />
              <button type="button" id="togglePass" aria-label="Show password"
                style="position:absolute;right:.7rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--slate);cursor:pointer;font-family:var(--f-mono);font-size:.72rem;letter-spacing:.05em">SHOW</button>
            </div>
            <a href="forgot-password.html" style="align-self:flex-end;font-size:.82rem;color:var(--marigold-2);font-weight:600;margin-top:.4rem">Forgot password?</a>
          </div>
          <button class="btn btn-accent btn-block" type="submit">Sign in</button>
        </form>
       <p class="auth-foot">Need help?Contact your Institution Administrator.</p>
        <p class="auth-foot" style="margin-top:.4rem"><a href="index.html" style="color:var(--slate)">← Back to home</a></p>
      </div>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/Staff-login.js"></script>
</body>
</html>
