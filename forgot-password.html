<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset password — AcademiaX</title>
<link rel="stylesheet" href="css/base.css" />
<link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <div class="auth-wrap">
    <aside class="auth-aside">
      <a class="brand" href="index.html"><span class="mark" style="background:var(--marigold);color:var(--ink)">A</span>AcademiaX</a>
      <div>
        <span class="eyebrow">Account recovery</span>
        <h2>Reset your password.</h2>
        <p>Enter your institution code and we'll email a reset code to the registered address.</p>
      </div>
      <p class="mono" style="color:#8A97A8;font-size:.72rem">Codes expire in 10 minutes</p>
    </aside>

    <main class="auth-main">
      <div class="auth-card">
        <h1>Reset password</h1>
        <p class="auth-sub">We'll send a code to your institution's email.</p>
        <div id="alert" class="alert"></div>

        <section class="step-pane active" id="pane1">
          <form id="form1">
            <div class="field"><label for="code">Institution code</label><input id="code" required placeholder="e.g. DEMO1234" style="text-transform:uppercase" /></div>
            <button class="btn btn-accent btn-block" type="submit">Send reset code</button>
          </form>
        </section>

        <section class="step-pane" id="pane2">
          <form id="form2">
            <div class="field"><label for="otp">Reset code</label><input id="otp" inputmode="numeric" required placeholder="6-digit code" /></div>
            <div class="field"><label for="newpass">New password</label><input id="newpass" type="password" required placeholder="At least 8 characters" /></div>
            <button class="btn btn-accent btn-block" type="submit">Reset password</button>
          </form>
        </section>

        <p class="auth-foot">Remembered it? <a href="login.html">Sign in</a></p>
      </div>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/forgot.js"></script>
</body>
</html>
